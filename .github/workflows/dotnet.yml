name: .NET CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '9.0.x'
  DOCKER_HOST: tcp://localhost:2375

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_successful: ${{ steps.build.outputs.success }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        id: build
        run: |
          dotnet build --configuration Release
          echo "success=true" >> $GITHUB_OUTPUT

  analyze_warnings:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4

      - name: Get changed files
        id: get_changes
        run: |
          git fetch origin main
          FILES=$(git diff --name-only --diff-filter=AMR origin/main...HEAD | grep '\.cs$' | tr '\n' '|')
          echo "changed_files=${FILES%?}" >> $GITHUB_OUTPUT  # Remove trailing |

      - name: Find warnings in changes
        id: find_warnings
        run: |
          WARNINGS=$(dotnet build --configuration Release --no-restore --verbosity normal | \
                    grep -i "warning" | \
                    grep -E "${{ steps.get_changes.outputs.changed_files }}" || true)
          
          WARNING_COUNT=$(echo "$WARNINGS" | grep -c . || echo "0")
          echo "warning_count=${WARNING_COUNT}" >> $GITHUB_OUTPUT
          echo "warnings<<EOF" >> $GITHUB_OUTPUT
          echo "$WARNINGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment warnings on PR
        if: steps.find_warnings.outputs.warning_count != '0'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Build Warnings (${${{ steps.find_warnings.outputs.warning_count }})\n` +
                     '```\n' +
                     `${{ steps.find_warnings.outputs.warnings }}` +
                     '\n```\n' +
                     'Consider fixing these warnings.'
            })

  test:
    needs: build
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        ports:
          - 2375:2375
        options: --privileged
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run tests
        run: dotnet test --configuration Release --no-build