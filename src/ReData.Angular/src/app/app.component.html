<div class="w-full p-6 ">
  <h1 class="text-2xl font-bold mb-4">API Transformation GUI</h1>

  <div class="flex flex-row gap-6 h-[calc(100vh-180px)]">
    <!-- Left Panel - Transformations -->
    <div class="w-1/2 overflow-y-auto pr-3">
      <nz-divider nzText="Transformations"></nz-divider>

      <div class="flex flex-col gap-4 mb-6">
        <div *ngFor="let transformation of transformations; let i = index" class="w-full">
          <nz-card class="w-full">
            <div class="flex justify-between items-center mb-4">
              Where

              <button nz-button nzType="text" nzDanger (click)="removeTransformation(i)">
                <span nz-icon nzType="delete"></span>
              </button>
            </div>

            <div *ngIf="transformation.$type === 'where'">
              editor
              <nz-code-editor>

              </nz-code-editor>
              end
            </div>
          </nz-card>
        </div>

        <button
          nz-button
          nzType="dashed"
          (click)="addTransformation()"
          class="w-full">
          <span nz-icon nzType="plus"></span> Add Transformation
        </button>
      </div>

      <div class="flex justify-end mt-4">
        <button
          nz-button
          nzType="primary"
          (click)="executeTransformations()"
          [nzLoading]="loading"
          class="px-6">
          Execute Transformations
        </button>
      </div>
    </div>

    <!-- Right Panel - Results -->
    <div class="w-1/2 flex flex-col">
      <nz-divider nzText="Results"></nz-divider>

      <nz-tabset class="flex-1 flex flex-col" [(nzSelectedIndex)]="activeTab">
        <nz-tab nzTitle="Preview">
          <div class="flex-1 overflow-auto">
            <nz-table
              *ngIf="responseData"
              [nzData]="responseData.data"
              [nzFrontPagination]="false"
              [nzShowPagination]="false"
              [nzScroll]="{ x: '100%', y: '100%' }"
              class="h-full">
              <thead>
              <tr>
                <th *ngFor="let field of responseData.fields">{{ field.alias }}</th>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let item of responseData.data">
                <td *ngFor="let field of responseData.fields">{{ item[field.alias] }}</td>
              </tr>
              </tbody>
            </nz-table>

            <nz-empty *ngIf="!responseData" nzNotFoundContent="No data available"></nz-empty>
          </div>
        </nz-tab>

        <nz-tab nzTitle="Query">
          <div class="flex-1 overflow-hidden">

            <nz-empty *ngIf="!responseData" nzNotFoundContent="No query available"></nz-empty>
          </div>
        </nz-tab>
      </nz-tabset>
    </div>
  </div>
</div>
